name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & unit/property/architecture tests
        run: ./mvnw -B verify -DskipITs

      - name: Mutation testing — case-management
        run: ./mvnw -B -pl services/case-management
             org.pitest:pitest-maven:mutationCoverage

      - name: Mutation testing — transaction-monitoring
        run: ./mvnw -B -pl services/transaction-monitoring
             org.pitest:pitest-maven:mutationCoverage

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-reports
          path: |
            services/case-management/target/pit-reports/
            services/transaction-monitoring/target/pit-reports/

  contract:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Consumer-side Pact tests (generates pact file)
        run: ./mvnw -B -pl services/case-management test -Dtest='*ConsumerPactTest'
      - name: Provider-side Pact verification
        run: ./mvnw -B -pl services/transaction-monitoring test -Dtest='*ProducerPactTest'
      - name: Upload pact files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: services/case-management/target/pacts/

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Integration tests (Testcontainers)
        run: ./mvnw -B verify -Dtest='*IT' -DfailIfNoTests=false

  docker:
    runs-on: ubuntu-latest
    needs: [contract, integration]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [case-management, transaction-monitoring]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:${{ github.sha }}
