replicaCount: 2

image:
  repository: aml-registry:5000/case-management
  tag: 0.1.0
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  DB_HOST: postgres
  KAFKA_BOOTSTRAP: kafka:9092
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
  OTEL_SERVICE_NAME: case-management
  TRACE_SAMPLE_RATE: "1.0"

# Pod-level annotations make Prometheus scrape automatically
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/actuator/prometheus"
  prometheus.io/port: "8080"

# SLOs feed the burn-rate detector — your statistical baseline
slo:
  availability: 99.9
  latency:
    p95Ms: 200
    p99Ms: 500

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCpuUtilization: 70

podDisruptionBudget:
  minAvailable: 1

networkPolicy:
  enabled: true
