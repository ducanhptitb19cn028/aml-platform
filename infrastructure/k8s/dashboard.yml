# ─────────────────────────────────────────────────────────────────────────────
# AIOps React Dashboard — Kubernetes manifest
# Apply: kubectl apply -f infrastructure/k8s/dashboard.yml
# Requires: alerting-service running in namespace aiops
# Access: kubectl port-forward -n aiops svc/aiops-dashboard 3001:80
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-dashboard
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-dashboard
    app.kubernetes.io/part-of: aiops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-dashboard
    spec:
      containers:
        - name: aiops-dashboard
          image: localhost:5001/aiops-dashboard:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 30
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: aiops-dashboard
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
