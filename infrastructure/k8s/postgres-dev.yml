# ─────────────────────────────────────────────────────────────────────────────
# Dev-only PostgreSQL StatefulSets (3 instances)
# Replaces: helm install bitnami/postgresql (blocked by Windows WDAC on Chocolatey shim)
# Service names match what the Bitnami chart produces so aml-platform.yml needs no changes.
# Apply: kubectl apply -f infrastructure/k8s/postgres-dev.yml
# ─────────────────────────────────────────────────────────────────────────────

# ── postgres-kyc ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-kyc-secret
  namespace: data
type: Opaque
stringData:
  POSTGRES_USER:     kyc
  POSTGRES_PASSWORD: dev
  POSTGRES_DB:       customer_kyc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-kyc
  namespace: data
  labels:
    app: postgres-kyc
spec:
  serviceName: postgres-kyc-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgres-kyc
  template:
    metadata:
      labels:
        app: postgres-kyc
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          envFrom:
            - secretRef:
                name: postgres-kyc-secret
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [pg_isready, -U, kyc, -d, customer_kyc]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-kyc-postgresql
  namespace: data
spec:
  selector:
    app: postgres-kyc
  ports:
    - port: 5432
      targetPort: 5432

---
