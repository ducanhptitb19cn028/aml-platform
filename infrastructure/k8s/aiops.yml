# ══════════════════════════════════════════════════════════
#  Ollama — local Qwen2.5:3b inference server (port 11434)
#  First startup: pulls ~2 GB model from ollama.com
#  Model is cached on the PVC so subsequent restarts are instant.
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: aiops
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: aiops
  labels:
    app.kubernetes.io/name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"   # keep model loaded in memory indefinitely
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 5 && ollama pull qwen2.5:3b 2>&1 | tee /tmp/pull.log &"
          livenessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "ollama list | grep -q qwen2.5"]
            initialDelaySeconds: 60    # model pull takes a few minutes first time
            periodSeconds: 30
            failureThreshold: 20       # wait up to 10 minutes
          resources:
            requests: { cpu: "1",   memory: 4Gi }
            limits:   { cpu: "4",   memory: 8Gi }
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: aiops
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http

---
# ══════════════════════════════════════════════════════════
#  llm-engine  (port 8001 · Qwen2.5-3B via Ollama + LoRA training)
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-engine
  namespace: aiops
  labels:
    app.kubernetes.io/name: llm-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8001"
    spec:
      containers:
        - name: llm-engine
          image: localhost:5001/llm-engine:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: OLLAMA_URL
              value: "http://ollama.aiops.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "qwen2.5:3b"
            - name: TRAINING_MODEL
              value: "Qwen/Qwen2.5-0.5B-Instruct"   # fast CPU training; change to 3B for GPU
            - name: MIN_TRAINING_EXAMPLES
              value: "5"
            - name: TRAIN_EPOCHS
              value: "3"
            - name: ADAPTER_DIR
              value: "/tmp/qwen-lora-adapter"
          envFrom:
            - configMapRef:
                name: aiops-common-env
          readinessProbe:
            httpGet: { path: /v1/health, port: http }
            periodSeconds: 10
            initialDelaySeconds: 20
          resources:
            requests: { cpu: 500m,  memory: 1Gi }
            limits:   { cpu: "2",   memory: 6Gi }   # training needs headroom
---
apiVersion: v1
kind: Service
metadata:
  name: llm-engine
  namespace: aiops
spec:
  selector:
    app.kubernetes.io/name: llm-engine
  ports:
    - name: http
      port: 8001
      targetPort: http

---
# ══════════════════════════════════════════════════════════
#  Elasticsearch  (port 9200 · single-node dev)
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: aiops
  labels:
    app.kubernetes.io/name: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: elasticsearch:7.17.25
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - name: http
              containerPort: 9200
          readinessProbe:
            httpGet: { path: /_cluster/health, port: http }
            periodSeconds: 10
            initialDelaySeconds: 30
            failureThreshold: 10
          resources:
            requests: { cpu: 300m, memory: 1Gi }
            limits:   { cpu: "1",  memory: 2Gi }
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: es-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: aiops
spec:
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: http

