#  ml-engine  (Python FastAPI · port 8000)
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-engine
  namespace: aiops
  labels:
    app.kubernetes.io/name: ml-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8000"
    spec:
      containers:
        - name: ml-engine
          image: localhost:5001/ml-engine:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: aiops-common-env
          env:
            - name: SLO_THRESHOLD_MS
              value: "500"
          readinessProbe:
            httpGet: { path: /v1/health, port: http }
            periodSeconds: 10
            initialDelaySeconds: 15
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            periodSeconds: 30
          resources:
            requests: { cpu: 300m, memory: 512Mi }
            limits:   { cpu: "2",  memory: 2Gi }
