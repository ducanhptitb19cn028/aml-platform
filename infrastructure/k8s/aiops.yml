# ─────────────────────────────────────────────────────────────────────────────
# AIOps Platform — Kubernetes manifests
# Apply: kubectl apply -f infrastructure/k8s/aiops.yml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: aiops
  labels:
    app.kubernetes.io/part-of: aiops-platform

---
# ══════════════════════════════════════════════════════════
#  RBAC — remediation-engine needs cluster-wide edit rights
#  for Deployments, HPAs, and Ingresses in the aml namespace
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-engine
  namespace: aiops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-remediation-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-remediation-binding
subjects:
  - kind: ServiceAccount
    name: remediation-engine
    namespace: aiops
roleRef:
  kind: ClusterRole
  name: aiops-remediation-role
  apiGroup: rbac.authorization.k8s.io

---
# ══════════════════════════════════════════════════════════
#  ConfigMap — shared env for all AIOps services
# ══════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-common-env
  namespace: aiops
data:
  KAFKA_BOOTSTRAP:    "kafka.data.svc.cluster.local:9092"
  PROMETHEUS_URL:     "http://prometheus-operated.monitoring.svc.cluster.local:9090"
  LOKI_URL:           "http://loki.monitoring.svc.cluster.local:3100"
  TEMPO_URL:          "http://tempo.monitoring.svc.cluster.local:3200"
  MLFLOW_URL:         "http://mlflow.aiops.svc.cluster.local:5000"
  ELASTICSEARCH_URL:  "http://elasticsearch.aiops.svc.cluster.local:9200"

---
# ══════════════════════════════════════════════════════════
#  telemetry-collector  (port 9001)
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-collector
  namespace: aiops
  labels:
    app.kubernetes.io/name: telemetry-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telemetry-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telemetry-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "9001"
    spec:
      containers:
        - name: telemetry-collector
          image: localhost:5001/telemetry-collector:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9001
          envFrom:
            - configMapRef:
                name: aiops-common-env
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: telemetry-collector
            - name: TRACE_SAMPLE_RATE
              value: "1.0"
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds: 10
            initialDelaySeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-collector
  namespace: aiops
spec:
  selector:
    app.kubernetes.io/name: telemetry-collector
  ports:
    - name: http
      port: 9001
      targetPort: http

