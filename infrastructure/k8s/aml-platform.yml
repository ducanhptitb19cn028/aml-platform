  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: case-management
  namespace: aml
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: case-management

---
# ── ServiceMonitors — let kube-prometheus-stack scrape AML services ──────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: customer-kyc
  namespace: aml
  labels:
    release: kube-prom-stack
spec:
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-kyc
  namespaceSelector:
    matchNames: [aml]
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: transaction-monitoring
  namespace: aml
  labels:
    release: kube-prom-stack
spec:
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: transaction-monitoring
  namespaceSelector:
    matchNames: [aml]
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: case-management
  namespace: aml
  labels:
    release: kube-prom-stack
spec:
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: case-management
  namespaceSelector:
