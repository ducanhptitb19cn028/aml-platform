server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SSE — disable buffering so events flow immediately
    location /api/v1/stream {
        proxy_pass         http://alerting-service:9005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # LLM engine proxy
    location /api/llm/ {
        proxy_pass         http://llm-engine:8001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Observability backends (MELT page)
    location /prom/ {
        proxy_pass         http://kube-prom-stack-kube-prome-prometheus.monitoring.svc.cluster.local:9090/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    location /lokiapi/ {
        proxy_pass         http://loki.monitoring.svc.cluster.local:3100/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    location /tempo/ {
        proxy_pass         http://tempo.monitoring.svc.cluster.local:3200/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    # Alerting-service REST API
    location /api/ {
        proxy_pass         http://alerting-service:9005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
