apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: aiops
  labels:
    app: agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      serviceAccountName: agent-service
      containers:
        - name: agent-service
          image: localhost:5001/agent-service:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9007
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "qwen2.5:3b"
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: ALERTING_URL
              value: "http://alerting-service.aiops.svc.cluster.local:9005"
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
