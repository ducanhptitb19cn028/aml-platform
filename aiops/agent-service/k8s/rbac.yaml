apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-service
  namespace: aiops
---
# Read access across all three namespaces + ability to restart/scale in aml & aiops
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-service
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, services, endpoints, configmaps, events, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [apps]
    resources: [deployments/scale]
    verbs: [get, update, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]          # for pod restarts
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-service
subjects:
  - kind: ServiceAccount
    name: agent-service
    namespace: aiops
roleRef:
  kind: ClusterRole
  name: agent-service
  apiGroup: rbac.authorization.k8s.io
