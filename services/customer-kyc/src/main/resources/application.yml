spring:
  application:
    name: customer-kyc
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:customer_kyc}
    username: ${DB_USER:kyc}
    password: ${DB_PASS:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

server:
  port: 8082
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${ENV:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        aml.kyc.lookup: true
      percentiles:
        # Lookup is on the hot path of every transaction evaluation in
        # Monitoring, so we want a tighter percentile resolution.
        http.server.requests: 0.5, 0.95, 0.99, 0.999
  tracing:
    sampling:
      probability: ${TRACE_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
  level:
    com.alexbank.aml: INFO
    org.springframework.kafka: WARN

aml:
  kafka:
    topic:
      customers: aml.customers.events
  outbox:
    poll-interval-ms: 500
    batch-size: 50
    send-timeout-seconds: 5
